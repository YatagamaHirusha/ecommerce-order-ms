spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://localhost:5432/oms_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/